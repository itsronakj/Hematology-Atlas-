<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اطلس هماتولوژی — بیمارستان امام علی</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: #f7f7f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      padding: 36px 24px 24px;
      border-bottom: 1px solid #ddd;
      background: #fff;
      text-align: right;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
    }
    header p {
      margin-top: 4px;
      font-size: 0.8rem;
      color: #999;
      letter-spacing: 0.04em;
    }

    .search-bar {
      padding: 16px 24px;
      background: #fff;
      border-bottom: 1px solid #ddd;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .search-bar input {
      width: 100%;
      max-width: 480px;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      font-family: inherit;
      background: #fafafa;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar input:focus { border-color: #888; background: #fff; }
    #count {
      margin-top: 8px;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.03em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: #ddd;
    }

    .card {
      background: #fff;
      overflow: hidden;
      cursor: pointer;
      transition: background 0.15s;
    }
    .card:hover { background: #f9f9f7; }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #eee;
    }
    .img-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #ececec;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
    }

    .card .info { padding: 12px 14px 14px; text-align: right; direction: rtl; }
    .card .title {
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.03em;
      color: #111;
      line-height: 1.3;
    }
    .card .desc {
      margin-top: 5px;
      font-size: 0.75rem;
      color: #666;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card .read-more {
      margin-top: 4px;
      font-size: 0.7rem;
      color: #999;
      letter-spacing: 0.03em;
    }

    .no-results {
      grid-column: 1 / -1;
      padding: 60px 24px;
      text-align: center;
      color: #aaa;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      background: #fff;
    }

    /* LIGHTBOX */
    .lb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
      padding: 20px 16px 40px;
    }
    .lb-overlay.active { display: flex; }

    .lb-close {
      align-self: flex-end;
      background: none;
      border: none;
      color: #aaa;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      margin-bottom: 12px;
      padding: 0 4px;
    }
    .lb-close:hover { color: #fff; }

    .lb-img {
      width: 100%;
      max-width: 600px;
      border-radius: 4px;
      display: block;
    }

    .lb-body {
      width: 100%;
      max-width: 600px;
      margin-top: 20px;
      text-align: right;
      direction: rtl;
    }
    .lb-title {
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: 0.04em;
      line-height: 1.4;
    }
    .lb-desc {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #ccc;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      header { padding: 24px 16px 18px; }
      .search-bar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>اطلس هماتولوژی</h1>
  <p>بیمارستان امام علی</p>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="جستجو..." autocomplete="off" />
  <div id="count"></div>
</div>

<div class="grid" id="grid"></div>

<!-- LIGHTBOX -->
<div class="lb-overlay" id="lightbox">
  <button class="lb-close" id="lb-close">×</button>
  <img class="lb-img" id="lb-img" src="" alt="" />
  <div class="lb-body">
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-desc" id="lb-desc"></div>
  </div>
</div>

<script>
  // =====================
  //  ADD SLIDES HERE
  // =====================
  const slides = [
    {
      title: "Spherocyte — اسفروسیت",
      desc: "گلبول قرمز گرد و متراکم فاقد ناحیه رنگ‌پریدگی مرکزی (Central Pallor).\nMCHC معمولاً افزایش می‌یابد.\n\nدیده می‌شود در:\n• Hereditary Spherocytosis\n• Autoimmune Hemolytic Anemia (AIHA)",
      img: "images/1000119247.jpg"
    },
    {
      title: "Target Cell — سلول تارگت",
      desc: "ظاهر شبیه هدف تیراندازی با حلقه رنگی، هاله رنگ‌پریده و نقطه مرکزی.\nافزایش نسبت سطح به حجم سلول.\n\nدیده می‌شود در:\n• Beta Thalassemia\n• بیماری‌های کبدی\n• پس از اسپلنکتومی",
      img: "images/1000119248.jpg"
    },
  ];
  // =====================

  const grid = document.getElementById('grid');
  const searchInput = document.getElementById('search');
  const countEl = document.getElementById('count');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbTitle = document.getElementById('lb-title');
  const lbDesc = document.getElementById('lb-desc');
  const lbClose = document.getElementById('lb-close');

  function openLightbox(slide) {
    lbImg.src = slide.img;
    lbImg.alt = slide.title;
    lbTitle.textContent = slide.title;
    lbDesc.textContent = slide.desc;
    lightbox.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
    lbImg.src = '';
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

  function render(list) {
    grid.innerHTML = '';
    if (list.length === 0) {
      grid.innerHTML = '<div class="no-results">No slides found</div>';
      countEl.textContent = '';
      return;
    }
    countEl.textContent = list.length + ' slide' + (list.length !== 1 ? 's' : '');
    list.forEach(slide => {
      const card = document.createElement('div');
      card.className = 'card';
      card.addEventListener('click', () => openLightbox(slide));

      const imgEl = document.createElement('img');
      imgEl.src = slide.img;
      imgEl.alt = slide.title;
      imgEl.loading = 'lazy';
      imgEl.onerror = function() {
        const ph = document.createElement('div');
        ph.className = 'img-placeholder';
        ph.textContent = 'no image';
        this.replaceWith(ph);
      };

      const descLines = slide.desc.split('\n');
      const shortDesc = descLines[0];
      const hasMore = slide.desc.length > shortDesc.length || shortDesc.length > 120;

      card.innerHTML = `
        <div class="info">
          <div class="title">${slide.title}</div>
          <div class="desc">${shortDesc}</div>
          ${hasMore ? '<div class="read-more">tap to read more →</div>' : ''}
        </div>
      `;
      card.prepend(imgEl);
      grid.appendChild(card);
    });
  }

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    if (!q) { render(slides); return; }
    const filtered = slides.filter(s =>
      s.title.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q)
    );
    render(filtered);
  });

  render(slides);
</script>
</body>
</html>
